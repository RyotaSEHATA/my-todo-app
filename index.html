<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Family Ops</title>
    <meta name="theme-color" content="#0d1117" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">FAMILY OPS</p>
          <h1 class="page-title">今日の処理ボード</h1>
          <p class="subtitle">判断を減らして、機械的に片づける</p>
        </div>

        <div class="status-grid">
          <section class="status-card status-card-critical">
            <span class="status-label">CRITICAL</span>
            <strong id="criticalCount" class="status-value">0</strong>
          </section>

          <section class="status-card">
            <span class="status-label">OPEN TODO</span>
            <strong id="openTodoCount" class="status-value">0</strong>
          </section>

          <section class="status-card">
            <span class="status-label">TODAY EVENTS</span>
            <strong id="todayEventCount" class="status-value">0</strong>
          </section>
        </div>
      </header>

      <main class="dashboard">
        <section class="panel panel-critical">
          <div class="panel-header">
            <h2 class="panel-title">CRITICAL</h2>
            <span id="criticalBadge" class="panel-count">0</span>
          </div>
          <div id="criticalList" class="panel-body"></div>
        </section>

        <section class="panel panel-next">
          <div class="panel-header">
            <h2 class="panel-title">NEXT</h2>
            <span id="nextBadge" class="panel-count">0</span>
          </div>
          <div id="nextList" class="panel-body"></div>
        </section>

        <section class="panel panel-later">
          <div class="panel-header">
            <h2 class="panel-title">LATER</h2>
            <span id="laterBadge" class="panel-count">0</span>
          </div>
          <div id="laterList" class="panel-body"></div>
        </section>

        <section class="panel panel-event">
          <div class="panel-header">
            <h2 class="panel-title">TODAY EVENTS</h2>
            <span id="eventsBadge" class="panel-count">0</span>
          </div>
          <div id="eventList" class="panel-body"></div>
        </section>
      </main>
    </div>

    <div class="quick-bar">
      <input
        id="quickInput"
        class="quick-input"
        type="text"
        placeholder="追加するTODOを入力"
        autocomplete="off"
      />
      <button id="addButton" class="quick-button" type="button">追加</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
